// ─── NODE CANVAS ANIMATION ────────────────────────────────────────────────────
function NodeCanvas({ nodeColor }) {
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const nodesRef = useRef([]);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W = canvas.offsetWidth;
    let H = canvas.offsetHeight;
    canvas.width = W;
    canvas.height = H;

    const N = Math.floor((W * H) / 14000);
    nodesRef.current = Array.from({ length: N }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.35,
      vy: (Math.random() - 0.5) * 0.35,
      r: Math.random() * 2 + 1,
      pulse: Math.random() * Math.PI * 2,
    }));

    const draw = () => {
      ctx.clearRect(0, 0, W, H);
      const nodes = nodesRef.current;
      const [r, g, b] = nodeColor.split(',');

      nodes.forEach(n => {
        n.x += n.vx;
        n.y += n.vy;
        n.pulse += 0.02;
        if (n.x < 0 || n.x > W) n.vx *= -1;
        if (n.y < 0 || n.y > H) n.vy *= -1;
      });

      // Draw connections
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const maxDist = 160;
          if (dist < maxDist) {
            const alpha = (1 - dist / maxDist) * 0.35;
            ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.stroke();
          }
        }
      }

      // Draw nodes
      nodes.forEach(n => {
        const pulse = Math.sin(n.pulse) * 0.5 + 0.5;
        const alpha = 0.5 + pulse * 0.5;
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r + pulse * 0.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
        ctx.fill();

        // Glow halo
        const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r * 4);
        grad.addColorStop(0, `rgba(${r},${g},${b},${0.15 * pulse})`);
        grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r * 4, 0, Math.PI * 2);
        ctx.fill();
      });

      animRef.current = requestAnimationFrame(draw);
    };

    draw();

    const resize = () => {
      W = canvas.offsetWidth;
      H = canvas.offsetHeight;
      canvas.width = W;
      canvas.height = H;
    };
    window.addEventListener('resize', resize);
    return () => {
      cancelAnimationFrame(animRef.current);
      window.removeEventListener('resize', resize);
    };
  }, [nodeColor]);

  return (
    <canvas
      ref={canvasRef}
      style={{
        position: 'absolute', inset: 0, width: '100%', height: '100%',
        opacity: 0.7, zIndex: 0, pointerEvents: 'none',
      }}
    />
  );
}

// ─── CINEMATIC CANVAS BACKGROUND ────────────────────────────────────────────
function VideoBackground() {
  const canvasRef = useRef(null);
  const stateRef = useRef(null);
  const rafRef = useRef(null);
  const scrollRef = useRef(0);

  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    let W, H;

    const resize = () => {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    };
    resize();
    window.addEventListener('resize', resize);

    // Particle system
    const PARTICLE_COUNT = 50;
    const NODE_COUNT = 10;

    const particles = Array.from({ length: PARTICLE_COUNT }, () => ({
      x: Math.random() * 1920,
      y: Math.random() * 1080,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      size: Math.random() * 1.8 + 0.3,
      opacity: Math.random() * 0.6 + 0.1,
      hue: 250 + Math.random() * 60, // purple to blue range
      life: Math.random() * Math.PI * 2,
      lifeSpeed: 0.008 + Math.random() * 0.012,
    }));

    const nodes = Array.from({ length: NODE_COUNT }, () => ({
      x: Math.random() * 1920,
      y: Math.random() * 1080,
      vx: (Math.random() - 0.5) * 0.25,
      vy: (Math.random() - 0.5) * 0.25,
      r: Math.random() * 3 + 1.5,
      pulse: Math.random() * Math.PI * 2,
      pulseSpeed: 0.02 + Math.random() * 0.02,
      hue: 260 + Math.random() * 40,
    }));

    // Aurora streams
    const streams = Array.from({ length: 5 }, (_, i) => ({
      points: Array.from({ length: 8 }, (_, j) => ({
        x: (j / 7) * 1920,
        y: 200 + i * 150 + Math.random() * 100,
        oy: 200 + i * 150 + Math.random() * 100,
        phase: Math.random() * Math.PI * 2,
        speed: 0.003 + Math.random() * 0.004,
        amp: 40 + Math.random() * 60,
      })),
      hue: 250 + i * 15,
      opacity: 0.04 + Math.random() * 0.06,
    }));

    let t = 0;
    let lastFrame = 0;
    const FPS = 20;
    const INTERVAL = 1000 / FPS;

    const draw = (timestamp) => {
      rafRef.current = requestAnimationFrame(draw);
      if (timestamp - lastFrame < INTERVAL) return;
      lastFrame = timestamp;
      t += 0.008;
      const scroll = scrollRef.current;
      const totalScroll = Math.max(1, document.body.scrollHeight - window.innerHeight);
      const scrollP = scroll / totalScroll;

      ctx.clearRect(0, 0, W, H);

      // Background gradient
      const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.8);
      bg.addColorStop(0, `hsla(260, 60%, 8%, 1)`);
      bg.addColorStop(0.5, `hsla(255, 70%, 5%, 1)`);
      bg.addColorStop(1, `hsla(245, 80%, 2%, 1)`);
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      // Scale everything to canvas
      const scaleX = W / 1920;
      const scaleY = H / 1080;

      // Aurora streams
      streams.forEach(stream => {
        stream.points.forEach(p => {
          p.phase += p.speed;
          p.y = p.oy + Math.sin(p.phase) * p.amp;
        });

        ctx.beginPath();
        const pts = stream.points;
        ctx.moveTo(pts[0].x * scaleX, pts[0].y * scaleY);
        for (let i = 1; i < pts.length - 1; i++) {
          const mx = ((pts[i].x + pts[i+1].x) / 2) * scaleX;
          const my = ((pts[i].y + pts[i+1].y) / 2) * scaleY;
          ctx.quadraticCurveTo(pts[i].x * scaleX, pts[i].y * scaleY, mx, my);
        }

        const grad = ctx.createLinearGradient(0, 0, W, 0);
        grad.addColorStop(0, `hsla(${stream.hue}, 80%, 60%, 0)`);
        grad.addColorStop(0.3, `hsla(${stream.hue}, 80%, 65%, ${stream.opacity})`);
        grad.addColorStop(0.7, `hsla(${stream.hue + 20}, 80%, 70%, ${stream.opacity})`);
        grad.addColorStop(1, `hsla(${stream.hue + 30}, 80%, 60%, 0)`);

        ctx.strokeStyle = grad;
        ctx.lineWidth = 60 + Math.sin(t) * 20;
        ctx.filter = 'blur(18px)';
        ctx.stroke();
        ctx.filter = 'none';
      });

      // Central glow orb — shifts subtly with scroll
      const orbX = W * (0.5 + scrollP * 0.1 - 0.05);
      const orbY = H * (0.45 - scrollP * 0.05);
      const orbGrad = ctx.createRadialGradient(orbX, orbY, 0, orbX, orbY, W * 0.55);
      orbGrad.addColorStop(0, `hsla(270, 80%, 65%, 0.18)`);
      orbGrad.addColorStop(0.3, `hsla(265, 75%, 55%, 0.10)`);
      orbGrad.addColorStop(0.6, `hsla(255, 70%, 45%, 0.04)`);
      orbGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = orbGrad;
      ctx.fillRect(0, 0, W, H);

      // Secondary accent orb (bottom, shifts with scroll)
      const orb2X = W * (0.7 + scrollP * 0.15);
      const orb2Y = H * (0.8 + scrollP * 0.1);
      const orb2Grad = ctx.createRadialGradient(orb2X, orb2Y, 0, orb2X, orb2Y, W * 0.35);
      orb2Grad.addColorStop(0, `hsla(290, 70%, 60%, 0.12)`);
      orb2Grad.addColorStop(1, 'transparent');
      ctx.fillStyle = orb2Grad;
      ctx.fillRect(0, 0, W, H);

      // Node connections
      nodes.forEach(n => {
        n.x += n.vx; n.y += n.vy; n.pulse += n.pulseSpeed;
        if (n.x < 0 || n.x > 1920) n.vx *= -1;
        if (n.y < 0 || n.y > 1080) n.vy *= -1;
      });

      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = (nodes[i].x - nodes[j].x) * scaleX;
          const dy = (nodes[i].y - nodes[j].y) * scaleY;
          const dist = Math.sqrt(dx*dx + dy*dy);
          const maxD = 220;
          if (dist < maxD) {
            const alpha = (1 - dist/maxD) * 0.3;
            ctx.strokeStyle = `hsla(270, 80%, 70%, ${alpha})`;
            ctx.lineWidth = (1 - dist/maxD) * 1.2;
            ctx.beginPath();
            ctx.moveTo(nodes[i].x * scaleX, nodes[i].y * scaleY);
            ctx.lineTo(nodes[j].x * scaleX, nodes[j].y * scaleY);
            ctx.stroke();
          }
        }
      }

      // Draw nodes with glow
      nodes.forEach(n => {
        const pulse = Math.sin(n.pulse) * 0.5 + 0.5;
        const glow = ctx.createRadialGradient(n.x*scaleX, n.y*scaleY, 0, n.x*scaleX, n.y*scaleY, n.r*8);
        glow.addColorStop(0, `hsla(${n.hue}, 80%, 70%, ${0.4 * pulse})`);
        glow.addColorStop(1, 'transparent');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(n.x*scaleX, n.y*scaleY, n.r*8, 0, Math.PI*2);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(n.x*scaleX, n.y*scaleY, n.r * (1 + pulse * 0.5), 0, Math.PI*2);
        ctx.fillStyle = `hsla(${n.hue}, 90%, 80%, ${0.6 + pulse * 0.4})`;
        ctx.fill();
      });

      // Particles
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.life += p.lifeSpeed;
        if (p.x < 0) p.x = 1920; if (p.x > 1920) p.x = 0;
        if (p.y < 0) p.y = 1080; if (p.y > 1080) p.y = 0;
        const alpha = (Math.sin(p.life) * 0.5 + 0.5) * p.opacity;
        ctx.beginPath();
        ctx.arc(p.x*scaleX, p.y*scaleY, p.size, 0, Math.PI*2);
        ctx.fillStyle = `hsla(${p.hue}, 80%, 80%, ${alpha})`;
        ctx.fill();
      });

      // Vignette
      const vig = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, W*0.9);
      vig.addColorStop(0, 'transparent');
      vig.addColorStop(1, 'rgba(4,3,12,0.65)');
      ctx.fillStyle = vig;
      ctx.fillRect(0, 0, W, H);

    };

    rafRef.current = requestAnimationFrame(draw);

    const onScroll = () => { scrollRef.current = window.scrollY; };
    window.addEventListener('scroll', onScroll, { passive: true });

    return () => {
      cancelAnimationFrame(rafRef.current);
      window.removeEventListener('resize', resize);
      window.removeEventListener('scroll', onScroll);
    };
  }, []);

  return (
    <canvas ref={canvasRef} style={{
      position: 'fixed', inset: 0, zIndex: 0, pointerEvents: 'none',
      width: '100%', height: '100%',
    }} />
  );
}

// ─── HERO ─────────────────────────────────────────────────────────────────────
function Hero({ theme, tweaks, copy, lang }) {
  const [visible, setVisible] = useState(false);

  const t = (delay) => ({
    opacity: visible ? 1 : 0,

        <h1 className="serif" style={{
          ...t(0.25),
          fontSize: 'clamp(48px, 7vw, 96px)',
          fontWeight: 700, lineHeight: 1.05, letterSpacing: '-0.03em',
          marginBottom: 24, color: '#f0ecff',

          >{ctaPrimaryLabel} <span>→</span></a>
          <a href="#how-it-works" className="glass-btn-secondary" style={{
            color: '#e8e4f0',
            padding: '15px 32px', borderRadius: 10, fontSize: 15, fontWeight: 500,
            textDecoration: 'none',
            transition: 'transform 0.2s, box-shadow 0.3s',
          }}
            onMouseEnter={e => e.currentTarget.style.transform = 'translateY(-2px)'}
            onMouseLeave={e => e.currentTarget.style.transform = 'translateY(0)'}
          >{copy.hero.ctaSecondary}</a>
        </div>

        <div style={{
          ...t(0.7),
          display: 'flex', justifyContent: 'center',
          marginTop: 72, borderTop: '1px solid rgba(255,255,255,0.07)', paddingTop: 40,
        }}>

          <span>{copy.hero.scroll}</span>

        </div>
      </div>
    </section>
  );
}

// ─── FEATURES ────────────────────────────────────────────────────────────────
function Features({ theme, copy }) {
  const ILLUSTRATIONS = [IllustrationDesign, IllustrationWebApp, IllustrationAI, IllustrationSpeed, IllustrationAPI, IllustrationSupport];
  const cards = copy.services.cards.map((c, i) => ({ ...c, Illustration: ILLUSTRATIONS[i] }));

  const CARD_W = 260;
  const CARD_COUNT = cards.length;
  const ANGLE_STEP = 360 / CARD_COUNT;
  const RADIUS = Math.round(CARD_W / (2 * Math.tan(Math.PI / CARD_COUNT))) + 80;

  const rotRef = useRef(0);       // current displayed rotation
  const targetRef = useRef(0);    // target rotation to animate toward
  const rafRef = useRef(null);
  const [rotation, setRotation] = useState(0);
  const [activeIdx, setActiveIdx] = useState(0);
  const sectionRef = useRef(null);

  // Smooth animation loop — only runs when there's a difference to close
  useEffect(() => {
    const animate = () => {
      const diff = targetRef.current - rotRef.current;
      if (Math.abs(diff) > 0.05) {
        rotRef.current += diff * 0.12; // eased step
        setRotation(rotRef.current);
        setActiveIdx(Math.round(rotRef.current / ANGLE_STEP) % CARD_COUNT);
      } else {
        rotRef.current = targetRef.current;
        setRotation(targetRef.current);
      }
      rafRef.current = requestAnimationFrame(animate);
    };
    rafRef.current = requestAnimationFrame(animate);
    return () => cancelAnimationFrame(rafRef.current);
  }, []);

  const navigate = (target) => {
    const next = (target + CARD_COUNT) % CARD_COUNT;
    // Pick shortest rotation direction
    let delta = next * ANGLE_STEP - rotRef.current;
    // Normalize to -180..180
    while (delta > 180) delta -= 360;
    while (delta < -180) delta += 360;
    targetRef.current = rotRef.current + delta;
    setActiveIdx(next);
  };

  const ServiceCard = ({ card, idx }) => {
    const { Illustration, title, desc, tag } = card;
    const angle = idx * ANGLE_STEP;
    const cardRot = (rotation + angle) % 360;
    const absAngle = Math.abs(((cardRot % 360) + 360) % 360);
    const facing = absAngle > 180 ? 360 - absAngle : absAngle;
    const isFront = facing < 40;
    // Fixed: minimum opacity raised so no card disappears
    const opacity = isFront ? 1 : facing < 90 ? 0.88 : 0.72;

    return (
      <div style={{
        position: 'absolute',
        width: CARD_W,
        left: '50%',
        top: '50%',
        marginLeft: -CARD_W / 2,
        marginTop: -210,
        transform: `rotateY(${angle}deg) translateZ(${RADIUS}px)`,
        borderRadius: 16,
        border: `1px solid ${isFront ? 'rgba(160,120,255,0.45)' : 'rgba(255,255,255,0.06)'}`,
        background: isFront ? 'rgba(108,60,225,0.09)' : 'rgba(255,255,255,0.02)',
        backdropFilter: 'blur(20px)',
        boxShadow: isFront ? '0 0 48px rgba(108,60,225,0.28), inset 0 1px 0 rgba(255,255,255,0.08)' : 'inset 0 1px 0 rgba(255,255,255,0.03)',
        overflow: 'hidden',
        opacity,
        transition: 'border 0.4s, background 0.4s, box-shadow 0.4s, opacity 0.4s',
        willChange: 'transform, opacity',
        pointerEvents: isFront ? 'auto' : 'none',
      }}>
        {['tl','tr','bl','br'].map(c => (
          <div key={c} style={{
            position: 'absolute',
            top: c.startsWith('t') ? 10 : 'auto', bottom: c.startsWith('b') ? 10 : 'auto',
            left: c.endsWith('l') ? 10 : 'auto', right: c.endsWith('r') ? 10 : 'auto',
            width: 10, height: 10,
            borderTop: c.startsWith('t') ? '1.5px solid rgba(160,120,255,0.25)' : 'none',
            borderBottom: c.startsWith('b') ? '1.5px solid rgba(160,120,255,0.25)' : 'none',
            borderLeft: c.endsWith('l') ? '1.5px solid rgba(160,120,255,0.25)' : 'none',
            borderRight: c.endsWith('r') ? '1.5px solid rgba(160,120,255,0.25)' : 'none',
          }} />
        ))}
        <div style={{ height: 185, position: 'relative', overflow: 'hidden' }}>
          <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(ellipse at 50% 80%, rgba(108,60,225,0.1) 0%, transparent 70%)', zIndex: 1 }} />
          <div style={{ padding: '20px 24px 0', height: '100%' }}>
            <Illustration />
          </div>
        </div>
        <div style={{ height: 1, background: 'rgba(255,255,255,0.05)' }} />
        <div style={{ padding: '18px 22px 22px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
            <h3 style={{ fontSize: 14, fontWeight: 600, color: '#f0ecff', fontFamily: 'Inter', letterSpacing: '-0.01em', margin: 0 }}>{title}</h3>
            <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: theme.accentHex, background: `rgba(${theme.accentRgb},0.1)`, padding: '2px 8px', borderRadius: 100, whiteSpace: 'nowrap' }}>{tag}</span>
          </div>
          <p style={{ fontSize: 12.5, lineHeight: 1.65, color: 'rgba(232,228,240,0.45)', margin: 0 }}>{desc}</p>
        </div>
      </div>
    );
  };

  const dotStyle = (i) => ({
    width: i === activeIdx ? 20 : 6, height: 6, borderRadius: 3,
    background: i === activeIdx ? theme.accentHex : 'rgba(255,255,255,0.2)',
    transition: 'all 0.35s cubic-bezier(0.4,0,0.2,1)',
    cursor: 'pointer', border: 'none', padding: 0,
  });

  const btnStyle = {
    width: 40, height: 40, borderRadius: '50%',
    border: '1px solid rgba(255,255,255,0.12)',
    background: 'rgba(255,255,255,0.04)',
    color: '#e8e4f0', fontSize: 18, cursor: 'pointer',
    display: 'flex', alignItems: 'center', justifyContent: 'center',
    transition: 'background 0.2s, border 0.2s',
    backdropFilter: 'blur(8px)',
  };

  return (
    <section ref={sectionRef} id="services" className="section" style={{
      background: 'transparent', padding: '120px 0 100px',
      position: 'relative', zIndex: 1,
    }}>
      <div style={{ textAlign: 'center', marginBottom: 64, padding: '0 80px' }}>
        <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', color: theme.badgeDot, marginBottom: 16 }}>{copy.services.tag}</div>
        <h2 className="serif" style={{ fontSize: 'clamp(32px,4vw,52px)', fontWeight: 700, lineHeight: 1.1, letterSpacing: '-0.02em', color: '#f0ecff' }}>
          {copy.services.titleStart}<br /><em style={{ color: theme.accentHex }}>{copy.services.titleEm}</em>
        </h2>
      </div>

      {/* Main content: side nav + carousel */}
      <div style={{ display: 'flex', alignItems: 'center', maxWidth: 1200, margin: '0 auto', padding: '0 40px', transform: 'translateX(-80px)' }}>

        {/* Left side nav */}
        <div style={{
          display: 'flex', flexDirection: 'column', gap: 6,
          width: 260, flexShrink: 0, zIndex: 20,
        }}>
          {/* Header above menu */}
          <div style={{ marginBottom: 14, paddingLeft: 4 }}>
            <div style={{ fontSize: 13, fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase', color: theme.badgeDot, marginBottom: 4 }}>{copy.services.sideHeader}</div>
            <div style={{ width: 28, height: 1.5, background: theme.accentHex, borderRadius: 2, opacity: 0.5 }} />
          </div>

          {cards.map((card, i) => {
            const isActive = i === activeIdx;
            return (
              <button key={card.title} onClick={() => navigate(i)}
                style={{
                  display: 'flex', alignItems: 'center', gap: 10,
                  background: isActive ? `rgba(${theme.accentRgb},0.12)` : 'transparent',
                  border: `1px solid ${isActive ? `rgba(${theme.accentRgb},0.35)` : 'rgba(255,255,255,0.06)'}`,
                  borderRadius: 10, padding: '13px 18px',
                  cursor: 'pointer', textAlign: 'left', width: '100%',
                  transition: 'all 0.25s',
                  backdropFilter: isActive ? 'blur(12px)' : 'none',
                }}
                onMouseEnter={e => { if (!isActive) { e.currentTarget.style.background = 'rgba(255,255,255,0.04)'; e.currentTarget.style.borderColor = 'rgba(255,255,255,0.12)'; }}}
                onMouseLeave={e => { if (!isActive) { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.borderColor = 'rgba(255,255,255,0.06)'; }}}
              >
                {/* Active indicator bar */}
                <div style={{
                  width: 3, height: 28, borderRadius: 2, flexShrink: 0,
                  background: isActive ? theme.accentHex : 'rgba(255,255,255,0.15)',
                  transition: 'background 0.25s',
                }} />
                <div>
                  <div style={{ fontSize: 15.5, fontWeight: isActive ? 600 : 400, color: isActive ? '#f0ecff' : 'rgba(232,228,240,0.55)', transition: 'color 0.25s', lineHeight: 1.3 }}>
                    {card.title}
                  </div>
                  <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase', color: isActive ? theme.accentHex : 'rgba(255,255,255,0.25)', marginTop: 3 }}>
                    {card.tag}
                  </div>
                </div>
              </button>
            );
          })}
        </div>

        {/* Carousel */}
        <div style={{ flex: 1, position: 'relative', height: 480, perspective: 1100, perspectiveOrigin: '50% 42%' }}>
          <div style={{ position: 'absolute', left: '50%', top: 0, width: 0, height: '100%',
            transformStyle: 'preserve-3d', transform: `rotateY(${-rotation}deg)` }}>
            {cards.map((card, i) => <ServiceCard key={card.title} card={card} idx={i} />)}
          </div>
        </div>
      </div>

      {/* Bottom controls */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 20, marginTop: 32 }}>
        <button style={btnStyle} onClick={() => navigate(activeIdx - 1)}
          onMouseEnter={e => { e.currentTarget.style.background = 'rgba(108,60,225,0.2)'; e.currentTarget.style.borderColor = 'rgba(160,120,255,0.4)'; }}
          onMouseLeave={e => { e.currentTarget.style.background = 'rgba(255,255,255,0.04)'; e.currentTarget.style.borderColor = 'rgba(255,255,255,0.12)'; }}
        >‹</button>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {cards.map((_, i) => <button key={i} style={dotStyle(i)} onClick={() => navigate(i)} />)}
        </div>
        <button style={btnStyle} onClick={() => navigate(activeIdx + 1)}
          onMouseEnter={e => { e.currentTarget.style.background = 'rgba(108,60,225,0.2)'; e.currentTarget.style.borderColor = 'rgba(160,120,255,0.4)'; }}
          onMouseLeave={e => { e.currentTarget.style.background = 'rgba(255,255,255,0.04)'; e.currentTarget.style.borderColor = 'rgba(255,255,255,0.12)'; }}
        >›</button>
      </div>
    </section>
  );
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const theme = THEMES[tweaks.theme] || THEMES.cosmic;

  const [lang, setLangState] = useState(() => {
    try {
      const saved = localStorage.getItem('ealize-lang');
      if (saved === 'en' || saved === 'fi') return saved;
    } catch (e) {}
    return (typeof navigator !== 'undefined' && navigator.language && navigator.language.toLowerCase().startsWith('fi')) ? 'fi' : 'en';
  });
  const setLang = (l) => {
    setLangState(l);
    try { localStorage.setItem('ealize-lang', l); } catch (e) {}
  };
  useEffect(() => {
    document.documentElement.lang = lang;
  }, [lang]);
  const copy = COPY[lang] || COPY.en;

  return (
    <>
      <style>{`
        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.3; }
        }
        @keyframes scrollPulse {
          0%, 100% { opacity: 0.35; transform: scaleY(1); }
          50% { opacity: 0.7; transform: scaleY(1.2); }
        }
        input::placeholder, textarea::placeholder { color: rgba(232,228,240,0.3); }
        h1, h2, h3 { text-shadow: 0 2px 40px rgba(0,0,0,0.9), 0 0 80px rgba(0,0,0,0.6); }
        .glass-btn-primary {
          background: linear-gradient(135deg, rgba(108,60,225,0.9) 0%, rgba(80,30,200,0.95) 100%) !important;
          border: 1px solid rgba(160,120,255,0.5) !important;
          box-shadow: 0 0 24px rgba(108,60,225,0.55), 0 0 60px rgba(108,60,225,0.2), inset 0 1px 0 rgba(255,255,255,0.15) !important;
          backdrop-filter: blur(12px);
          position: relative; overflow: hidden;
        }
        .glass-btn-primary::before {
          content: ''; position: absolute; inset: 0;
          background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
          pointer-events: none;
        }
        .glass-btn-primary:hover {
          box-shadow: 0 0 36px rgba(108,60,225,0.8), 0 0 80px rgba(108,60,225,0.35), inset 0 1px 0 rgba(255,255,255,0.2) !important;
        }
        .glass-btn-secondary {
          background: rgba(255,255,255,0.05) !important;
          border: 1px solid rgba(255,255,255,0.18) !important;
          box-shadow: 0 0 20px rgba(108,60,225,0.15), inset 0 1px 0 rgba(255,255,255,0.08) !important;
          backdrop-filter: blur(16px);
          position: relative; overflow: hidden;
        }
        .glass-btn-secondary::before {
          content: ''; position: absolute; inset: 0;
          background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 60%);
          pointer-events: none;
        }
        .glass-btn-secondary:hover {
          border-color: rgba(160,120,255,0.5) !important;
          box-shadow: 0 0 28px rgba(108,60,225,0.25), inset 0 1px 0 rgba(255,255,255,0.12) !important;
        }
      `}</style>

      <VideoBackground />
      <Nav theme={theme} tweaks={tweaks} copy={copy} lang={lang} setLang={setLang} />
      <Hero theme={theme} tweaks={tweaks} copy={copy} lang={lang} />

      <HowItWorks theme={theme} copy={copy} />
      <Features theme={theme} copy={copy} />
      {tweaks.showPricing && <Pricing theme={theme} copy={copy} />}

      {/* Video background on contact section only */}
      <div style={{ position: 'relative', overflow: 'hidden' }}>
        <video autoPlay muted playsInline loop preload="auto"
          style={{ position: 'absolute', left: '50%', top: '50%', transform: 'translate(-50%, -50%)', width: '100%', height: 'auto', zIndex: 0, opacity: 0.5, pointerEvents: 'none', willChange: 'transform' }}>
          <source src="mp_.mp4" type="video/mp4" />
        </video>
        <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 400, background: 'linear-gradient(to bottom, #080712 30%, transparent)', zIndex: 1, pointerEvents: 'none' }} />
        <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: 120, background: 'linear-gradient(to top, #080712, transparent)', zIndex: 1, pointerEvents: 'none' }} />
        <div style={{ position: 'relative', zIndex: 2 }}>
          <CTA theme={theme} copy={copy} />
        </div>
      </div>

      <Footer theme={theme} copy={copy} />

      <TweaksPanel>
        <TweakSection title="Visual Theme">
          <TweakRadio id="theme" label="Style Variant" value={tweaks.theme} onChange={v => setTweak('theme', v)} options={[
            { value: 'cosmic', label: 'Dark Cosmic' },
            { value: 'editorial', label: 'Bold Editorial' },
            { value: 'fire', label: 'Void + Fire' },
          ]} />
        </TweakSection>
        <TweakSection title="Content">
          <TweakText id="heroHeadline" label="Hero Headline" value={tweaks.heroHeadline} onChange={v => setTweak('heroHeadline', v)} />
          <TweakText id="ctaLabel" label="CTA Button Label" value={tweaks.ctaLabel} onChange={v => setTweak('ctaLabel', v)} />
          <TweakToggle id="showPricing" label="Show Pricing Section" value={tweaks.showPricing} onChange={v => setTweak('showPricing', v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
